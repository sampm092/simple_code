<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calc</title>
    <style>
        body {
            font-family: sans-serif;
            background-color: gainsboro;
        }

        input,
        select,
        button,
        textarea {
            margin: 10px 0;
            padding: 10px;
            width: 100%;
            font-size: 16px;
            min-height: 18px;
        }

        select,
        button {
            cursor: pointer;
        }

        input,
        textarea {
            max-width: 576px;
            min-width: 576px;
        }

        .prm-btn {
            color: #fff;
            background-color: #007bff;
            border-color: #007bff;
        }

        button:hover {
            opacity: 80%;
        }

        h1,
        h4 {
            margin: 0;
        }

        .container {
            display: flex;
        }

        .main {
            max-width: 600px;
            margin: 50px auto;
            text-align: center;
        }

        .log{
            margin: auto;
        }
    </style>
</head>

<body>
    <section class="container">
        <div class="main">
            <h1>Calc</h1>
            <h4>is short for calculator</h4>

            <input type="number" id="input1" placeholder="Insert number here..."></input>
            <input type="number" id="input2" placeholder="Insert number here..."></input>

            <label for="ops">Operation:</label>
            <select id="ops">
                <option value="0">+</option>
                <option value="1">-</option>
                <option value="2">*</option>
                <option value="3">/</option>
                <option value="4">%</option>
            </select>

            <button id="calcBtn" class="prm-btn" onclick="calculate()">Generate</button>

            <h3>Output:</h3>
            <textarea id="outputText" readonly></textarea>
        </div>
        <div class="log">
            <h2>Log:</h2>
            <textarea name="" id="log" rows="25" readonly></textarea>
        </div>
    </section>

    <script>
        function calculate() {
            // input type number still take string, so parse it into integer first with:
            const in1 = +document.getElementById('input1').value;
            const in2 = parseInt(document.getElementById('input2').value);
            // or
            // const in = Number(document.getElementById('input').value);
            const chosenOps = document.getElementById('ops').value;
            const output = document.getElementById('outputText');

            if (!isNaN(in1) && !isNaN(in2)) { //prevent null value
                switch (chosenOps) {
                    case '0':
                        result = in1 + in2;
                        break;
                    case '1':
                        result = in1 - in2;
                        break;
                    case '2':
                        result = in1 * in2;
                        break;
                    case '3':
                        result = in1 / in2;
                        break;
                    case '4':
                        result = in1 % in2;
                        break;

                    default:
                        break;
                }
            } else {
                Swal.fire({
                    title: "Alert!",
                    text: "No Number!",
                    icon: "warning",
                    confirmButtonText: 'Back',
                    allowEnterKey: false
                });
            }
            output.value = result;
        }

        document.addEventListener("keydown", function (e) {
            if (e.key === "Enter") {
                calculate();
            }
        });
    </script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

</body>

</html>
