<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <div id="app"></div>


    <!-- Babel Script -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script type="text/jsx">
    // <script>
    const domNode = document.getElementById('app');
    
     /* Header is for React to distinguish it with header(HTML)*/
    function Header(props) { 
        return <h1>{`Cool ${props.title}`}</h1>;
    }

    function SubTitle(subprops){
        const a = subprops.title;
        return <h2>{a ? a : 'Default Sub-Title'} </h2>
    }

    
    function HomePage() {
        const arrayName = ['Asu', 'Koke', 'Ayama', 'Taure']
        // const array[value, updateFunction] = React.useState(initalValue)
        const [likes, setLikes] = React.useState(0); 

        function HandleClick(){
            setLikes(likes+1);
        }

        return (
            <div> HomePage
                {/* Nesting the Header component */}
                <Header title="Dev Sonethign somthing" />
                <SubTitle />
                <Header title="Second Title" />
                <ul>
                    {arrayName.map((insides) => 
                        <li key={insides}>{insides}</li>
                        )}
                </ul>
                <button onClick={HandleClick}>Like {likes}</button>
            </div>
        );
    }

    // Target a specific DOM element and create a root to display your React Components in
    const root = ReactDOM.createRoot(app);
    // Its just react way to call header function
    root.render(<HomePage />); 
  
 
    </script>
</body>

</html>
