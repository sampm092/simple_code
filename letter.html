<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vowel Replacer</title>
  <style>
    body {
      font-family: sans-serif;
      max-width: 600px;
      margin: 50px auto;
      text-align: center;
      background-color: gainsboro;
    }

    input,
    select,
    button,
    textarea {
      margin: 10px 0;
      padding: 10px;
      width: 100%;
      font-size: 16px;
    }

    select,
    button {
      cursor: pointer;
    }

    textarea {
      height: 20px;
      max-width: 576px;
      min-width: 576px;
    }

    .prm-btn {
      color: #fff;
      background-color: #007bff;
      border-color: #007bff;
    }

    button:hover {
      opacity: 80%;
    }

    #outputText {
      height: 160px;
    }

    #copyNotification {
      position: fixed;
      top: 50%;
      right: 20px;
      background-color: #4caf50;
      color: white;
      padding: 10px 20px;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.2);
      opacity: 0;
      transition: opacity 0.4s ease-in-out;
      z-index: 9999;
      pointer-events: none;
    }

    #copyNotification.show {
      opacity: 1;
    }
  </style>
</head>

<body>

  <h1>Letter Maker</h1>

  <textarea id="perusahaanInput" placeholder="Type your text here..."></textarea>
  <textarea id="jabatanInput" placeholder="Type your text here..."></textarea>

  <label for="option">Choose your letter type:</label>
  <select id="option">
    <option value="lamaran">Surat Lamaran</option>
    <option value="reminder">Surat Reminder</option>
  </select>

  <button class="prm-btn" onclick="replaceVowels()">Generate</button>

  <h3>Output:</h3>
  <textarea id="outputText" readonly></textarea>
  <button onclick="copText()" style="margin-bottom: 3rem;">Copy</button>
    <div id="copyNotification">Copied!</div>

  <script>
    function replaceVowels() {
      const perusahaan = document.getElementById('perusahaanInput').value;
      const jabatan = document.getElementById('jabatanInput').value;
      const option = document.getElementById('option').value;
      const now = new Date();
      const months = ["Januari", "Februari", "Maret", "April", "Mei", "Juni", "Juli", "Agustus", "September", "Oktober", "November", "Desember"];

      const day = now.getDate();
      const month = months[now.getMonth()];
      const year = now.getFullYear();

      const formattedDate = `${day} ${month} ${year}`;

      let replaced = '';

      if (perusahaan.trim() !== '' && jabatan.trim() !== '') {
        if (option == 'lamaran') {
          let text =
            `
Yth. HRD / Personalia PERUSAHAAN
di tempat

Dengan hormat,
Berdasarkan informasi lowongan kerja yang saya dapatkan melalui LinkedIn pada tanggal TIME, dengan ini saya bermaksud mengajukan diri untuk mengisi posisi JABATAN di PERUSAHAAN.
`;
          replaced = text.replace('JABATAN', jabatan);
          replaced = replaced.replaceAll('PERUSAHAAN', perusahaan);
          replaced = replaced.replace('TIME', formattedDate);
          document.getElementById('outputText').value = replaced;
        } else if (option == 'reminder') {

        }
      } else {
        Swal.fire({
          title: "Alert!",
          text: "No Texts!",
          icon: "warning",
          confirmButtonText: 'OK'
        });
      }
    }

    async function copText() {
      const textOutput = document.getElementById("outputText").value;
      navigator.clipboard.writeText(textOutput).then(() => {
        const notification = document.getElementById("copyNotification");
        notification.classList.add("show");
        setTimeout(() => {
          notification.classList.remove("show");
        }, 2000); // 2 seconds
      });
    }


  </script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

</body>

</html>
