<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vowel Replacer</title>
    <style>
        body {
            font-family: sans-serif;
            max-width: 600px;
            margin: 50px auto;
            text-align: center;
            background-color: gainsboro;
        }

        input,
        select,
        button,
        textarea {
            margin: 10px 0;
            padding: 10px;
            width: 100%;
            font-size: 16px;
        }

        select,
        button {
            cursor: pointer;
        }

        input, textarea {
            max-width: 576px;
            min-width: 576px;
        }

        .prm-btn {
            color: #fff;
            background-color: #007bff;
            border-color: #007bff;
        }

        button:hover {
            opacity: 80%;
        }
    </style>
</head>

<body>

    <h1>Calculator</h1>

    <input type="number" id="input1" placeholder="Insert number here..."></input>
    <input type="number" id="input2" placeholder="Insert number here..."></input>

    <label for="ops">Operation:</label>
    <select id="ops">
        <option value="0">+</option>
        <option value="1">-</option>
        <option value="2">*</option>
        <option value="3">/</option>
    </select>

    <button class="prm-btn" onclick="calculate()">Generate</button>

    <h3>Output:</h3>
    <textarea id="outputText" readonly></textarea>

    <script>
        function calculate() {
            const in1 = parseInt(document.getElementById('input1').value);
            const in2 = parseInt(document.getElementById('input2').value);
            const chosenOps = document.getElementById('ops').value;
            const output = document.getElementById('outputText');

            let result = '';

            if (!isNaN(in1) && !isNaN(in2)) {
                switch (chosenOps) {
                    case '0':
                        result = in1 + in2;
                        break;
                    case '1':
                        result = in1 - in2;
                        break;
                    case '2':
                        result = in1 * in2;
                        break;
                    case '3':
                        result = in1 / in2;
                        break;

                    default:
                        break;
                }
            } else {
                Swal.fire({
                    title: "Alert!",
                    text: "No Number!",
                    icon: "warning",
                    confirmButtonText: 'OK'
                });
            }
            output.value = result;
        }



    </script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

</body>

</html>
